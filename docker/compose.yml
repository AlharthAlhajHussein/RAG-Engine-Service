services:

  # 1. PostgreSQL (Orchestrator Chat History) - EXISTING
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: ai_orchestrator_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AI_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_ai_data:/var/lib/postgresql
    networks:
      - backend_private_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $AI_POSTGRES_USER -d $AI_POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. RAG DB (Vector Database)
  postgres_rag:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: rag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RAG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_PASSWORD}
      POSTGRES_DB: ${RAG_POSTGRES_DB}
    ports:
      - "5433:5432" # Maps laptop port 5433 to container port 5432
    volumes:
      - postgres_rag_data:/var/lib/postgresql # Uses a brand new volume
    networks:
      - backend_private_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $RAG_POSTGRES_USER -d $RAG_POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 3. Redis (Cache)
  redis:
    image: redis:8.6.1-trixie
    container_name: agents_platform_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend_private_network

volumes:
  postgres_ai_data:
  postgres_rag_data:
  redis_data:

networks:
  backend_private_network:
    driver: bridge